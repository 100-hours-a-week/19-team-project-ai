{{- if and .Values.httproute.enabled .Values.healthCheckRoute.enabled }}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ include "refit-ai.fullname" . }}-healthcheck
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "refit-ai.labels" . | nindent 4 }}
spec:
  parentRefs:
    {{- toYaml .Values.httproute.parentRefs | nindent 4 }}
  rules:
    - matches:
        - path:
            type: Exact
            value: {{ .Values.healthCheckRoute.path }}
      backendRefs:
        - name: {{ include "refit-ai.fullname" . }}
          port: {{ .Values.service.port }}
{{- end }}
