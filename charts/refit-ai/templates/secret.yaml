{{- if .Values.inlineSecretEnv }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "refit-ai.fullname" . }}-env
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "refit-ai.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{- range $key, $val := .Values.inlineSecretEnv }}
  {{ $key }}: {{ $val | quote }}
  {{- end }}
{{- end }}
