replicaCount: 1

image:
  repository: ""
  tag: "main-latest"
  pullPolicy: Always

nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  name: ""

imagePullSecrets: []

nodeSelector: {}

tolerations: []

deploymentStrategy:
  type: RollingUpdate
  rollingUpdate:
    maxSurge: 0
    maxUnavailable: 1

service:
  type: ClusterIP
  port: 8000

appSecretName: ""

inlineSecretEnv: {}

httproute:
  enabled: true
  parentRefs:
    - name: refit-gateway
      namespace: refit-app
  hostnames: []

  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /api/ai
      backendRefs:
        - name: ""
          port: 8000

healthCheckRoute:
  enabled: true
  path: /api/ai/health

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilizationPercentage: 70

resources:
  requests:
    cpu: "250m"
    memory: "512Mi"
  limits:
    cpu: "1000m"
    memory: "2Gi"

uploadVolume:
  enabled: true
  mountPath: /tmp/refit-ai/uploads

livenessProbe:
  httpGet:
    path: /health
    port: 8000
  initialDelaySeconds: 30
  periodSeconds: 30
  timeoutSeconds: 10
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /health
    port: 8000
  initialDelaySeconds: 20
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3

startupProbe:
  httpGet:
    path: /health
    port: 8000
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 18
