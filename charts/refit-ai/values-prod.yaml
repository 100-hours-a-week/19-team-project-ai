replicaCount: 1

image:
  tag: "main-latest"

appSecretName: "refit-ai-env-prod"

imagePullSecrets:
  - name: ecr-secret

nodeSelector: {}

httproute:
  enabled: true
  parentRefs:
    - name: refit-gateway
      namespace: refit-app
  hostnames: []
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /api/ai
      backendRefs:
        - name: refit-ai
          port: 8000

healthCheckRoute:
  enabled: true
  path: /api/ai/health

autoscaling:
  enabled: true
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilizationPercentage: 70

resources:
  requests:
    cpu: "500m"
    memory: "1Gi"
  limits:
    cpu: "2000m"
    memory: "3Gi"

startupProbe:
  httpGet:
    path: /health
    port: 8000
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 24
