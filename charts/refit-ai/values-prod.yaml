replicaCount: 1

image:
  tag: "main-latest"

appSecretName: "refit-ai-env-prod"

imagePullSecrets:
  - name: ecr-secret

# worker 노드에만 배포 (master는 control-plane 전용)
nodeSelector:
  node-role.kubernetes.io/worker-1: "worker-1"

httproute:
  enabled: true
  parentRefs:
    - name: refit-gateway
      namespace: refit-app
  hostnames:
    - api.refit.com
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /ai
      backendRefs:
        - name: refit-ai
          port: 8000

autoscaling:
  enabled: true
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilizationPercentage: 70

# worker 노드: 2CPU / 7.8GB RAM
# 현재 사용: ~2.5GB → 여유 ~5.3GB
resources:
  requests:
    cpu: "500m"
    memory: "1Gi"
  limits:
    cpu: "2000m"
    memory: "3Gi"
