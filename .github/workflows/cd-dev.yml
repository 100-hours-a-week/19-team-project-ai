name: Re-Fit AI CD (Dev)

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Docker image tag (e.g., develop-abc1234)'
        required: false
        type: string
      sha:
        description: 'Commit SHA'
        required: false
        type: string
      run_id:
        description: 'CI workflow run ID'
        required: false
        type: string
      use_latest:
        description: 'image_tag를 입력하지 않으면 develop-latest 태그 사용'
        required: true
        type: boolean
        default: true

env:
  AWS_REGION: ${{ secrets.AWS_REGION || 'ap-northeast-2' }}

jobs:
  deploy-dev:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    concurrency:
      group: deploy-ai-dev
      cancel-in-progress: false
    environment: development

    steps:
      - name: Preflight - validate required secrets
        env:
          ECR_REPOSITORY_AI: ${{ secrets.ECR_REPOSITORY_AI }}
          EC2_HOST_DEV: ${{ secrets.EC2_HOST_DEV }}
          EC2_USERNAME_DEV: ${{ secrets.EC2_USERNAME_DEV }}
          EC2_SSH_KEY_DEV: ${{ secrets.EC2_SSH_KEY_DEV }}
          COMPOSE_DIR_DEV: ${{ secrets.COMPOSE_DIR_DEV }}
          ENV_FILE_DEV: ${{ secrets.ENV_FILE_DEV }}
        run: |
          set -euo pipefail
          for v in ECR_REPOSITORY_AI EC2_HOST_DEV EC2_USERNAME_DEV EC2_SSH_KEY_DEV COMPOSE_DIR_DEV ENV_FILE_DEV; do
            if [ -z "${!v:-}" ]; then
              echo "Missing required secret: $v"
              exit 1
            fi
          done

      - name: Set deployment variables
        id: deploy-vars
        run: |
          set -euo pipefail
          USE_LATEST="${{ inputs.use_latest }}"

          if [ -n "${{ inputs.image_tag }}" ]; then
            IMAGE_TAG="${{ inputs.image_tag }}"
          elif [ "$USE_LATEST" = "true" ]; then
            IMAGE_TAG="develop-latest"
          else
            echo "image_tag is empty and use_latest is false."
            exit 1
          fi

          SHA="${{ inputs.sha }}"
          SHA_SHORT="${SHA:0:7}"

          echo "image_tag=${IMAGE_TAG}" >> "$GITHUB_OUTPUT"
          echo "sha=${SHA}" >> "$GITHUB_OUTPUT"
          echo "sha_short=${SHA_SHORT}" >> "$GITHUB_OUTPUT"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Verify image exists in ECR
        run: |
          set -euo pipefail
          IMAGE_TAG="${{ steps.deploy-vars.outputs.image_tag }}"
          REPO="${{ secrets.ECR_REPOSITORY_AI }}"

          aws ecr describe-images \
            --repository-name "$REPO" \
            --image-ids imageTag="$IMAGE_TAG" \
            --region "${{ env.AWS_REGION }}" > /dev/null

      - name: Prepare SSH
        env:
          EC2_HOST: ${{ secrets.EC2_HOST_DEV }}
          EC2_SSH_KEY: ${{ secrets.EC2_SSH_KEY_DEV }}
          EC2_SSH_PORT: ${{ secrets.EC2_SSH_PORT_DEV || '22' }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          printf '%s' "$EC2_SSH_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -p "$EC2_SSH_PORT" -H "$EC2_HOST" >> ~/.ssh/known_hosts

      - name: Upload env file
        env:
          EC2_HOST: ${{ secrets.EC2_HOST_DEV }}
          EC2_USER: ${{ secrets.EC2_USERNAME_DEV }}
          EC2_SSH_PORT: ${{ secrets.EC2_SSH_PORT_DEV || '22' }}
          COMPOSE_DIR: ${{ secrets.COMPOSE_DIR_DEV }}
          ENV_FILE_DEV: ${{ secrets.ENV_FILE_DEV }}
        run: |
          set -euo pipefail
          printf '%s\n' "$ENV_FILE_DEV" > /tmp/.env.ai
          chmod 600 /tmp/.env.ai
          scp -P "$EC2_SSH_PORT" -i ~/.ssh/id_rsa /tmp/.env.ai "$EC2_USER@$EC2_HOST:$COMPOSE_DIR/.env.ai"

      - name: Deploy via SSH
        env:
          EC2_HOST: ${{ secrets.EC2_HOST_DEV }}
          EC2_USER: ${{ secrets.EC2_USERNAME_DEV }}
          EC2_SSH_PORT: ${{ secrets.EC2_SSH_PORT_DEV || '22' }}
          COMPOSE_DIR: ${{ secrets.COMPOSE_DIR_DEV }}
          IMAGE_TAG: ${{ steps.deploy-vars.outputs.image_tag }}
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY_AI: ${{ secrets.ECR_REPOSITORY_AI }}
          AWS_REGION: ${{ env.AWS_REGION }}
        run: |
          set -euo pipefail

          ssh -p "$EC2_SSH_PORT" -i ~/.ssh/id_rsa "$EC2_USER@$EC2_HOST" \
            COMPOSE_DIR="$COMPOSE_DIR" \
            IMAGE_TAG="$IMAGE_TAG" \
            ECR_REGISTRY="$ECR_REGISTRY" \
            ECR_REPOSITORY_AI="$ECR_REPOSITORY_AI" \
            AWS_REGION="$AWS_REGION" \
            'bash -se' <<'REMOTE'
          set -euo pipefail
          export PATH="/usr/local/bin:/usr/bin:/bin:$PATH"

          # 배포 대상 경로와 필수 명령 확인
          [ -d "$COMPOSE_DIR" ] || { echo "Compose directory not found: $COMPOSE_DIR"; exit 1; }
          command -v docker >/dev/null 2>&1 || { echo "docker not found"; exit 1; }
          docker compose version >/dev/null 2>&1 || { echo "docker compose not found"; exit 1; }
          command -v aws >/dev/null 2>&1 || { echo "aws cli not found"; exit 1; }

          cd "$COMPOSE_DIR"
          chmod 644 .env.ai

          aws ecr get-login-password --region "$AWS_REGION" | docker login --username AWS --password-stdin "$ECR_REGISTRY"

          # .env 키를 안전하게 갱신(없으면 추가)
          if grep -q '^ECR_REGISTRY=' .env 2>/dev/null; then
            sed -i "s|^ECR_REGISTRY=.*|ECR_REGISTRY=${ECR_REGISTRY}|" .env
          else
            echo "ECR_REGISTRY=${ECR_REGISTRY}" >> .env
          fi

          if grep -q '^ECR_REPOSITORY_AI=' .env 2>/dev/null; then
            sed -i "s|^ECR_REPOSITORY_AI=.*|ECR_REPOSITORY_AI=${ECR_REPOSITORY_AI}|" .env
          else
            echo "ECR_REPOSITORY_AI=${ECR_REPOSITORY_AI}" >> .env
          fi

          if grep -q '^AI_TAG=' .env 2>/dev/null; then
            sed -i "s|^AI_TAG=.*|AI_TAG=${IMAGE_TAG}|" .env
          else
            echo "AI_TAG=${IMAGE_TAG}" >> .env
          fi

          docker compose pull ai
          docker compose up -d ai
          docker image prune -a -f 2>/dev/null || true

          for i in {1..15}; do
            HTTP_STATUS=$(timeout 10 curl -s -o /dev/null -w "%{http_code}" http://127.0.0.1:8000/health 2>/dev/null || echo "000")
            if [ "$HTTP_STATUS" = "200" ]; then
              echo "Internal health check passed (HTTP ${HTTP_STATUS})"
              exit 0
            fi
            echo "Internal health check attempt ${i}/15 - HTTP ${HTTP_STATUS}"
            sleep 5
          done

          echo "Internal health check failed"
          exit 1
          REMOTE

      - name: Notify Discord - Dev Deployment Complete
        if: success()
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          IMAGE_TAG: ${{ steps.deploy-vars.outputs.image_tag }}
          SHA: ${{ steps.deploy-vars.outputs.sha }}
          RUN_ID: ${{ github.run_id }}
        run: |
          [ -z "$DISCORD_WEBHOOK" ] && echo "Discord webhook not configured" && exit 0

          SHA_SHORT="${SHA:0:7}"
          payload=$(cat <<EOF
          {
            "embeds": [{
              "title": "AI 개발 서버 배포 완료",
              "description": "AI 개발 서버 배포가 성공적으로 완료되었습니다.",
              "color": 3447003,
              "fields": [
                {"name": "서비스", "value": "Re-Fit AI (Dev)", "inline": true},
                {"name": "이미지 태그", "value": "\`$IMAGE_TAG\`", "inline": true},
                {"name": "커밋 SHA", "value": "\`$SHA_SHORT\`", "inline": true},
                {"name": "워크플로우", "value": "[상세 보기](https://github.com/${{ github.repository }}/actions/runs/$RUN_ID)", "inline": false}
              ],
              "footer": { "text": "Re-Fit Dev Deployment System" },
              "timestamp": "$(date -u +%Y-%m-%dT%H:%M:%SZ)"
            }]
          }
          EOF
          )
          curl -H "Content-Type: application/json" -X POST -d "$payload" "$DISCORD_WEBHOOK"

      - name: Notify Discord on Dev Deploy Failure
        if: failure()
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          IMAGE_TAG: ${{ steps.deploy-vars.outputs.image_tag }}
          SHA: ${{ steps.deploy-vars.outputs.sha }}
          RUN_ID: ${{ github.run_id }}
        run: |
          [ -z "$DISCORD_WEBHOOK" ] && echo "Discord webhook not configured" && exit 0

          SHA_SHORT="${SHA:0:7}"
          payload=$(cat <<EOF
          {
            "embeds": [{
              "title": "AI 개발 서버 배포 실패",
              "description": "AI 개발 서버 배포가 실패했습니다. 워크플로우 로그를 확인하세요.",
              "color": 15158332,
              "fields": [
                {"name": "서비스", "value": "Re-Fit AI (Dev)", "inline": true},
                {"name": "이미지 태그", "value": "\`$IMAGE_TAG\`", "inline": true},
                {"name": "커밋 SHA", "value": "\`$SHA_SHORT\`", "inline": true},
                {"name": "워크플로우", "value": "[상세 보기](https://github.com/${{ github.repository }}/actions/runs/$RUN_ID)", "inline": false}
              ],
              "footer": { "text": "Re-Fit Dev Deployment System" },
              "timestamp": "$(date -u +%Y-%m-%dT%H:%M:%SZ)"
            }]
          }
          EOF
          )
          curl -H "Content-Type: application/json" -X POST -d "$payload" "$DISCORD_WEBHOOK"
