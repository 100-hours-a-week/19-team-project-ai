name: AI Service Rollback (Prod)

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: '복구할 Docker image tag (e.g., main-abc1234). 입력 시 해당 태그로 재배포. 비워두면 Helm 이전 revision으로 롤백.'
        required: false
        type: string
      revision:
        description: '롤백할 Helm revision 번호 (비워두면 직전 revision으로 롤백)'
        required: false
        type: string

permissions:
  contents: read

env:
  AWS_REGION: ${{ secrets.AWS_REGION || 'ap-northeast-2' }}

jobs:
  rollback:
    name: Rollback AI (Prod) via Helm
    runs-on: ubuntu-latest
    timeout-minutes: 30
    concurrency:
      group: rollback-ai-prod
      cancel-in-progress: false
    environment: production

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Preflight - validate required secrets
        env:
          K8S_KUBECONFIG_PROD: ${{ secrets.K8S_KUBECONFIG_PROD }}
          K8S_NAMESPACE: ${{ secrets.K8S_NAMESPACE }}
          K8S_HELM_RELEASE_NAME: ${{ secrets.K8S_HELM_RELEASE_NAME }}
        run: |
          set -euo pipefail
          for v in K8S_KUBECONFIG_PROD K8S_NAMESPACE K8S_HELM_RELEASE_NAME; do
            if [ -z "${!v:-}" ]; then
              echo "Missing required secret: $v"
              exit 1
            fi
          done

      - name: Configure AWS credentials
        if: ${{ inputs.image_tag != '' }}
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        if: ${{ inputs.image_tag != '' }}
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Verify image exists in ECR (image_tag 입력 시)
        if: ${{ inputs.image_tag != '' }}
        run: |
          set -euo pipefail
          aws ecr describe-images \
            --repository-name "${{ secrets.ECR_REPOSITORY_AI }}" \
            --image-ids imageTag="${{ inputs.image_tag }}" \
            --region "${{ env.AWS_REGION }}" > /dev/null

      - name: Setup kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.K8S_KUBECONFIG_PROD }}" > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Rollback
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          set -euo pipefail
          RELEASE="${{ secrets.K8S_HELM_RELEASE_NAME }}"
          NAMESPACE="${{ secrets.K8S_NAMESPACE }}"

          if [ -n "${{ inputs.image_tag }}" ]; then
            echo "image_tag 지정: ${{ inputs.image_tag }} 으로 재배포"
            helm upgrade --install "$RELEASE" charts/refit-ai \
              --namespace "$NAMESPACE" \
              --values charts/refit-ai/values-prod.yaml \
              --set "image.repository=${ECR_REGISTRY}/${{ secrets.ECR_REPOSITORY_AI }}" \
              --set "image.tag=${{ inputs.image_tag }}" \
              --set "appSecretName=${{ secrets.K8S_APP_SECRET_NAME_PROD }}" \
              --atomic \
              --timeout 10m \
              --cleanup-on-fail
          else
            REVISION="${{ inputs.revision }}"
            if [ -z "$REVISION" ]; then
              echo "직전 revision으로 롤백"
              helm rollback "$RELEASE" --namespace "$NAMESPACE" --wait --timeout 10m
            else
              echo "revision ${REVISION}으로 롤백"
              helm rollback "$RELEASE" "$REVISION" --namespace "$NAMESPACE" --wait --timeout 10m
            fi
          fi

      - name: Notify Discord
        if: always()
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          STATUS: ${{ job.status }}
          IMAGE_TAG: ${{ inputs.image_tag }}
          REVISION: ${{ inputs.revision }}
          RUN_ID: ${{ github.run_id }}
        run: |
          [ -z "$DISCORD_WEBHOOK" ] && exit 0

          if [ "$STATUS" = "success" ]; then
            COLOR=3066993
            TITLE="AI 롤백 성공"
          else
            COLOR=15158332
            TITLE="AI 롤백 실패"
          fi

          ROLLBACK_TARGET="${IMAGE_TAG:-revision ${REVISION:-이전}}"

          payload=$(cat <<EOF
          {
            "embeds": [{
              "title": "$TITLE",
              "color": $COLOR,
              "fields": [
                {"name": "서비스", "value": "Re-Fit AI (Prod)", "inline": true},
                {"name": "롤백 대상", "value": "\`$ROLLBACK_TARGET\`", "inline": true},
                {"name": "워크플로우", "value": "[상세 보기](https://github.com/${{ github.repository }}/actions/runs/$RUN_ID)", "inline": false}
              ],
              "footer": { "text": "Re-Fit AI Rollback" },
              "timestamp": "$(date -u +%Y-%m-%dT%H:%M:%SZ)"
            }]
          }
          EOF
          )
          curl -sS -H "Content-Type: application/json" -X POST -d "$payload" "$DISCORD_WEBHOOK" >/dev/null
