name: AI Service Rollback (Prod)

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: '복구할 Docker image tag (e.g., main-abc1234)'
        required: true
        type: string

permissions:
  contents: read

env:
  AWS_REGION: ${{ secrets.AWS_REGION || 'ap-northeast-2' }}

jobs:
  rollback:
    name: Rollback to Previous Image
    runs-on: ubuntu-latest
    timeout-minutes: 30
    concurrency:
      group: rollback-ai-prod
      cancel-in-progress: false
    environment: production

    steps:
      - name: Preflight - validate required secrets
        env:
          ECR_REPOSITORY_AI: ${{ secrets.ECR_REPOSITORY_AI }}
          EC2_HOST_PROD: ${{ secrets.EC2_HOST_PROD }}
          EC2_USERNAME_PROD: ${{ secrets.EC2_USERNAME_PROD }}
          EC2_SSH_KEY_PROD: ${{ secrets.EC2_SSH_KEY_PROD }}
          COMPOSE_DIR_PROD: ${{ secrets.COMPOSE_DIR_PROD }}
          ENV_FILE_PROD: ${{ secrets.ENV_FILE_PROD }}
        run: |
          set -euo pipefail
          for v in ECR_REPOSITORY_AI EC2_HOST_PROD EC2_USERNAME_PROD EC2_SSH_KEY_PROD COMPOSE_DIR_PROD ENV_FILE_PROD; do
            if [ -z "${!v:-}" ]; then
              echo "Missing required secret: $v"
              exit 1
            fi
          done

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Verify image exists in ECR
        run: |
          set -euo pipefail
          aws ecr describe-images \
            --repository-name "${{ secrets.ECR_REPOSITORY_AI }}" \
            --image-ids imageTag="${{ inputs.image_tag }}" \
            --region "${{ env.AWS_REGION }}" > /dev/null

      - name: Prepare SSH
        env:
          EC2_HOST: ${{ secrets.EC2_HOST_PROD }}
          EC2_SSH_KEY: ${{ secrets.EC2_SSH_KEY_PROD }}
          EC2_SSH_PORT: ${{ secrets.EC2_SSH_PORT_PROD || '22' }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          printf '%s' "$EC2_SSH_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -p "$EC2_SSH_PORT" -H "$EC2_HOST" >> ~/.ssh/known_hosts

      - name: Upload env file
        env:
          EC2_HOST: ${{ secrets.EC2_HOST_PROD }}
          EC2_USER: ${{ secrets.EC2_USERNAME_PROD }}
          EC2_SSH_PORT: ${{ secrets.EC2_SSH_PORT_PROD || '22' }}
          COMPOSE_DIR: ${{ secrets.COMPOSE_DIR_PROD }}
          ENV_FILE_PROD: ${{ secrets.ENV_FILE_PROD }}
        run: |
          set -euo pipefail
          printf '%s\n' "$ENV_FILE_PROD" > /tmp/.env.ai
          chmod 600 /tmp/.env.ai
          scp -P "$EC2_SSH_PORT" -i ~/.ssh/id_rsa /tmp/.env.ai "$EC2_USER@$EC2_HOST:$COMPOSE_DIR/.env.ai"

      - name: Rollback via SSH
        id: rollback
        env:
          EC2_HOST: ${{ secrets.EC2_HOST_PROD }}
          EC2_USER: ${{ secrets.EC2_USERNAME_PROD }}
          EC2_SSH_PORT: ${{ secrets.EC2_SSH_PORT_PROD || '22' }}
          COMPOSE_DIR: ${{ secrets.COMPOSE_DIR_PROD }}
          IMAGE_TAG: ${{ inputs.image_tag }}
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY_AI: ${{ secrets.ECR_REPOSITORY_AI }}
          AWS_REGION: ${{ env.AWS_REGION }}
        run: |
          set -euo pipefail

          ssh -p "$EC2_SSH_PORT" -i ~/.ssh/id_rsa "$EC2_USER@$EC2_HOST" \
            COMPOSE_DIR="$COMPOSE_DIR" \
            IMAGE_TAG="$IMAGE_TAG" \
            ECR_REGISTRY="$ECR_REGISTRY" \
            ECR_REPOSITORY_AI="$ECR_REPOSITORY_AI" \
            AWS_REGION="$AWS_REGION" \
            'bash -se' <<'REMOTE'
          set -euo pipefail
          export PATH="/usr/local/bin:/usr/bin:/bin:$PATH"

          # 롤백 전 필수 구성요소 점검
          [ -d "$COMPOSE_DIR" ] || { echo "Compose directory not found: $COMPOSE_DIR"; exit 1; }
          command -v docker >/dev/null 2>&1 || { echo "docker not found"; exit 1; }
          docker compose version >/dev/null 2>&1 || { echo "docker compose not found"; exit 1; }
          command -v aws >/dev/null 2>&1 || { echo "aws cli not found"; exit 1; }

          cd "$COMPOSE_DIR"
          chmod 644 .env.ai

          aws ecr get-login-password --region "$AWS_REGION" | docker login --username AWS --password-stdin "$ECR_REGISTRY"

          # .env 키를 안전하게 갱신(없으면 추가)
          if grep -q '^ECR_REGISTRY=' .env 2>/dev/null; then
            sed -i "s|^ECR_REGISTRY=.*|ECR_REGISTRY=${ECR_REGISTRY}|" .env
          else
            echo "ECR_REGISTRY=${ECR_REGISTRY}" >> .env
          fi

          if grep -q '^ECR_REPOSITORY_AI=' .env 2>/dev/null; then
            sed -i "s|^ECR_REPOSITORY_AI=.*|ECR_REPOSITORY_AI=${ECR_REPOSITORY_AI}|" .env
          else
            echo "ECR_REPOSITORY_AI=${ECR_REPOSITORY_AI}" >> .env
          fi

          if grep -q '^AI_TAG=' .env 2>/dev/null; then
            sed -i "s|^AI_TAG=.*|AI_TAG=${IMAGE_TAG}|" .env
          else
            echo "AI_TAG=${IMAGE_TAG}" >> .env
          fi

          docker compose pull ai
          docker compose up -d ai
          docker image prune -a -f 2>/dev/null || true

          for i in {1..15}; do
            code=$(curl -s -o /dev/null -w "%{http_code}" http://127.0.0.1:8000/health || echo 000)
            if [ "$code" = "200" ]; then
              echo "Rollback health check passed"
              exit 0
            fi
            echo "Rollback health check attempt ${i}/15 - HTTP ${code}"
            sleep 5
          done

          echo "Rollback health check failed"
          exit 1
          REMOTE

      - name: Notify Discord
        if: always()
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          STATUS: ${{ job.status }}
          IMAGE_TAG: ${{ inputs.image_tag }}
          RUN_ID: ${{ github.run_id }}
        run: |
          [ -z "$DISCORD_WEBHOOK" ] && exit 0

          if [ "$STATUS" = "success" ]; then
            COLOR=3066993
            TITLE="AI 롤백 성공"
          else
            COLOR=15158332
            TITLE="AI 롤백 실패"
          fi

          payload=$(cat <<EOF
          {
            "embeds": [{
              "title": "$TITLE",
              "color": $COLOR,
              "fields": [
                {"name": "서비스", "value": "Re-Fit AI (Prod)", "inline": true},
                {"name": "이미지 태그", "value": "\`$IMAGE_TAG\`", "inline": true},
                {"name": "워크플로우", "value": "[상세 보기](https://github.com/${{ github.repository }}/actions/runs/$RUN_ID)", "inline": false}
              ],
              "footer": { "text": "Re-Fit AI Rollback" },
              "timestamp": "$(date -u +%Y-%m-%dT%H:%M:%SZ)"
            }]
          }
          EOF
          )
          curl -s -H "Content-Type: application/json" -X POST -d "$payload" "$DISCORD_WEBHOOK"
