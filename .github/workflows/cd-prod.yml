name: Re-Fit AI CD (Prod)

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Docker image tag (e.g., main-abc1234)'
        required: false
        type: string
      sha:
        description: 'Commit SHA'
        required: false
        type: string
      run_id:
        description: 'CI workflow run ID'
        required: false
        type: string
      use_latest:
        description: 'image_tag를 입력하지 않으면 main-latest 태그 사용'
        required: true
        type: boolean
        default: true

permissions:
  contents: read
  actions: read

env:
  AWS_REGION: ${{ secrets.AWS_REGION || 'ap-northeast-2' }}

jobs:
  deploy-prod:
    name: Deploy AI to Prod (K8s Helm)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    concurrency:
      group: deploy-ai-prod
      cancel-in-progress: false
    environment: production

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Preflight - validate required secrets
        env:
          ECR_REPOSITORY_AI: ${{ secrets.ECR_REPOSITORY_AI }}
          K8S_KUBECONFIG_PROD: ${{ secrets.K8S_KUBECONFIG_PROD }}
          K8S_NAMESPACE: ${{ secrets.K8S_NAMESPACE }}
          K8S_HELM_RELEASE_NAME: ${{ secrets.K8S_HELM_RELEASE_NAME }}
          K8S_APP_SECRET_NAME_PROD: ${{ secrets.K8S_APP_SECRET_NAME_PROD }}
        run: |
          set -euo pipefail
          for v in ECR_REPOSITORY_AI K8S_KUBECONFIG_PROD K8S_NAMESPACE K8S_HELM_RELEASE_NAME K8S_APP_SECRET_NAME_PROD; do
            if [ -z "${!v:-}" ]; then
              echo "Missing required secret: $v"
              exit 1
            fi
          done

      - name: Set deployment variables
        id: deploy-vars
        run: |
          set -euo pipefail
          if [ -n "${{ inputs.image_tag }}" ]; then
            IMAGE_TAG="${{ inputs.image_tag }}"
          elif [ "${{ inputs.use_latest }}" = "true" ]; then
            IMAGE_TAG="main-latest"
          else
            echo "image_tag is empty and use_latest is false."
            exit 1
          fi

          SHA="${{ inputs.sha }}"
          echo "image_tag=${IMAGE_TAG}" >> "$GITHUB_OUTPUT"
          echo "sha_short=${SHA:0:7}" >> "$GITHUB_OUTPUT"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Verify image exists in ECR
        run: |
          set -euo pipefail
          aws ecr describe-images \
            --repository-name "${{ secrets.ECR_REPOSITORY_AI }}" \
            --image-ids imageTag="${{ steps.deploy-vars.outputs.image_tag }}" \
            --region "${{ env.AWS_REGION }}" > /dev/null

      - name: Mask sensitive values in logs
        run: |
          echo "::add-mask::${{ steps.login-ecr.outputs.registry }}"
          echo "::add-mask::${{ secrets.ECR_REPOSITORY_AI }}"
          echo "::add-mask::${{ secrets.AWS_ACCESS_KEY_ID }}"
          echo "::add-mask::${{ secrets.AWS_SECRET_ACCESS_KEY }}"

      - name: Setup kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.K8S_KUBECONFIG_PROD }}" > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Deploy via Helm upgrade --install
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ steps.deploy-vars.outputs.image_tag }}
        run: |
          set -euo pipefail
          helm upgrade --install "${{ secrets.K8S_HELM_RELEASE_NAME }}" charts/refit-ai \
            --namespace "${{ secrets.K8S_NAMESPACE }}" \
            --values charts/refit-ai/values-prod.yaml \
            --set "image.repository=${ECR_REGISTRY}/${{ secrets.ECR_REPOSITORY_AI }}" \
            --set "image.tag=${IMAGE_TAG}" \
            --set "appSecretName=${{ secrets.K8S_APP_SECRET_NAME_PROD }}" \
            --atomic \
            --timeout 10m \
            --cleanup-on-fail

      - name: Notify Discord - Success
        if: success()
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          IMAGE_TAG: ${{ steps.deploy-vars.outputs.image_tag }}
          SHA_SHORT: ${{ steps.deploy-vars.outputs.sha_short }}
          RUN_ID: ${{ github.run_id }}
        run: |
          [ -z "$DISCORD_WEBHOOK" ] && exit 0
          payload=$(cat <<EOF
          {
            "embeds": [{
              "title": "AI 프로덕션 배포 완료",
              "description": "AI 프로덕션 배포가 성공적으로 완료되었습니다.",
              "color": 3066993,
              "fields": [
                {"name": "서비스", "value": "Re-Fit AI (Prod)", "inline": true},
                {"name": "이미지 태그", "value": "\`$IMAGE_TAG\`", "inline": true},
                {"name": "커밋 SHA", "value": "\`$SHA_SHORT\`", "inline": true},
                {"name": "워크플로우", "value": "[상세 보기](https://github.com/${{ github.repository }}/actions/runs/$RUN_ID)", "inline": false}
              ],
              "footer": { "text": "Re-Fit Prod Deployment" },
              "timestamp": "$(date -u +%Y-%m-%dT%H:%M:%SZ)"
            }]
          }
          EOF
          )
          curl -sS -H "Content-Type: application/json" -X POST -d "$payload" "$DISCORD_WEBHOOK" >/dev/null

      - name: Notify Discord - Failure
        if: failure()
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          IMAGE_TAG: ${{ steps.deploy-vars.outputs.image_tag }}
          SHA_SHORT: ${{ steps.deploy-vars.outputs.sha_short }}
          RUN_ID: ${{ github.run_id }}
        run: |
          [ -z "$DISCORD_WEBHOOK" ] && exit 0
          payload=$(cat <<EOF
          {
            "embeds": [{
              "title": "AI 프로덕션 배포 실패",
              "description": "AI 프로덕션 배포가 실패했습니다. 로그를 확인하세요.",
              "color": 15158332,
              "fields": [
                {"name": "서비스", "value": "Re-Fit AI (Prod)", "inline": true},
                {"name": "이미지 태그", "value": "\`$IMAGE_TAG\`", "inline": true},
                {"name": "커밋 SHA", "value": "\`$SHA_SHORT\`", "inline": true},
                {"name": "워크플로우", "value": "[상세 보기](https://github.com/${{ github.repository }}/actions/runs/$RUN_ID)", "inline": false}
              ],
              "footer": { "text": "Re-Fit Prod Deployment" },
              "timestamp": "$(date -u +%Y-%m-%dT%H:%M:%SZ)"
            }]
          }
          EOF
          )
          curl -sS -H "Content-Type: application/json" -X POST -d "$payload" "$DISCORD_WEBHOOK" >/dev/null
