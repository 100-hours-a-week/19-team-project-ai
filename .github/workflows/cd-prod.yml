name: Re-Fit AI CD (Prod)

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Docker image tag (e.g., main-abc1234)'
        required: false
        type: string
      sha:
        description: 'Commit SHA'
        required: false
        type: string
      run_id:
        description: 'CI workflow run ID'
        required: false
        type: string
      use_latest:
        description: 'image_tag를 입력하지 않으면 main-latest 태그 사용'
        required: true
        type: boolean
        default: true

permissions:
  contents: read
  actions: read

env:
  AWS_REGION: ${{ secrets.AWS_REGION || 'ap-northeast-2' }}
  CLOUD_REPO: 100-hours-a-week/19-team-project-cloud
  HELM_VALUES_PATH: k8s/helm/refit-ai/values.yaml

jobs:
  deploy-prod:
    name: Deploy AI to Prod (GitOps)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    concurrency:
      group: deploy-ai-prod
      cancel-in-progress: false
    environment: production

    steps:
      - name: Preflight - validate required secrets
        env:
          PAT: ${{ secrets.PAT }}
          ECR_REPOSITORY_AI: ${{ secrets.ECR_REPOSITORY_AI }}
        run: |
          set -euo pipefail
          for v in PAT ECR_REPOSITORY_AI; do
            if [ -z "${!v:-}" ]; then
              echo "Missing required secret: $v"
              exit 1
            fi
          done

      - name: Set deployment variables
        id: deploy-vars
        run: |
          set -euo pipefail
          if [ -n "${{ inputs.image_tag }}" ]; then
            IMAGE_TAG="${{ inputs.image_tag }}"
          elif [ "${{ inputs.use_latest }}" = "true" ]; then
            IMAGE_TAG="main-latest"
          else
            echo "image_tag is empty and use_latest is false."
            exit 1
          fi

          SHA="${{ inputs.sha }}"
          echo "image_tag=${IMAGE_TAG}" >> "$GITHUB_OUTPUT"
          echo "sha_short=${SHA:0:7}" >> "$GITHUB_OUTPUT"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Verify image exists in ECR
        run: |
          set -euo pipefail
          aws ecr describe-images \
            --repository-name "${{ secrets.ECR_REPOSITORY_AI }}" \
            --image-ids imageTag="${{ steps.deploy-vars.outputs.image_tag }}" \
            --region "${{ env.AWS_REGION }}" > /dev/null
          echo "Image verified: ${{ steps.deploy-vars.outputs.image_tag }}"

      - name: Mask sensitive values in logs
        run: |
          echo "::add-mask::${{ steps.login-ecr.outputs.registry }}"
          echo "::add-mask::${{ secrets.ECR_REPOSITORY_AI }}"
          echo "::add-mask::${{ secrets.AWS_ACCESS_KEY_ID }}"
          echo "::add-mask::${{ secrets.AWS_SECRET_ACCESS_KEY }}"

      - name: Checkout cloud repository
        uses: actions/checkout@v4
        with:
          repository: ${{ env.CLOUD_REPO }}
          token: ${{ secrets.PAT }}
          path: cloud-repo

      - name: Update image tag in cloud repo (GitOps)
        run: |
          set -euo pipefail
          cd cloud-repo

          sed -i 's|^  tag:.*|  tag: "${{ steps.deploy-vars.outputs.image_tag }}"|' "${{ env.HELM_VALUES_PATH }}"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "${{ env.HELM_VALUES_PATH }}"

          if git diff --cached --quiet; then
            echo "Image tag already up to date. Nothing to commit."
            exit 0
          fi

          git commit -m "deploy(refit-ai): update image tag to ${{ steps.deploy-vars.outputs.image_tag }}"
          git push
          echo "GitOps update pushed. ArgoCD will deploy automatically."

      - name: Notify Discord - Success
        if: success()
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          IMAGE_TAG: ${{ steps.deploy-vars.outputs.image_tag }}
          SHA_SHORT: ${{ steps.deploy-vars.outputs.sha_short }}
          RUN_ID: ${{ github.run_id }}
        run: |
          [ -z "$DISCORD_WEBHOOK" ] && exit 0
          payload=$(cat <<EOF
          {
            "embeds": [{
              "title": "AI 프로덕션 배포 진행 중",
              "description": "cloud repo image tag 업데이트 완료. ArgoCD가 배포를 진행합니다.",
              "color": 3066993,
              "fields": [
                {"name": "서비스", "value": "Re-Fit AI (Prod)", "inline": true},
                {"name": "이미지 태그", "value": "\`$IMAGE_TAG\`", "inline": true},
                {"name": "커밋 SHA", "value": "\`$SHA_SHORT\`", "inline": true},
                {"name": "워크플로우", "value": "[상세 보기](https://github.com/${{ github.repository }}/actions/runs/$RUN_ID)", "inline": false}
              ],
              "footer": { "text": "Re-Fit Prod Deployment · GitOps" },
              "timestamp": "$(date -u +%Y-%m-%dT%H:%M:%SZ)"
            }]
          }
          EOF
          )
          curl -sS -H "Content-Type: application/json" -X POST -d "$payload" "$DISCORD_WEBHOOK" >/dev/null

      - name: Notify Discord - Failure
        if: failure()
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          IMAGE_TAG: ${{ steps.deploy-vars.outputs.image_tag }}
          SHA_SHORT: ${{ steps.deploy-vars.outputs.sha_short }}
          RUN_ID: ${{ github.run_id }}
        run: |
          [ -z "$DISCORD_WEBHOOK" ] && exit 0
          payload=$(cat <<EOF
          {
            "embeds": [{
              "title": "AI 프로덕션 배포 실패",
              "description": "cloud repo image tag 업데이트 또는 ECR 검증에 실패했습니다.",
              "color": 15158332,
              "fields": [
                {"name": "서비스", "value": "Re-Fit AI (Prod)", "inline": true},
                {"name": "이미지 태그", "value": "\`$IMAGE_TAG\`", "inline": true},
                {"name": "커밋 SHA", "value": "\`$SHA_SHORT\`", "inline": true},
                {"name": "워크플로우", "value": "[상세 보기](https://github.com/${{ github.repository }}/actions/runs/$RUN_ID)", "inline": false}
              ],
              "footer": { "text": "Re-Fit Prod Deployment · GitOps" },
              "timestamp": "$(date -u +%Y-%m-%dT%H:%M:%SZ)"
            }]
          }
          EOF
          )
          curl -sS -H "Content-Type: application/json" -X POST -d "$payload" "$DISCORD_WEBHOOK" >/dev/null
