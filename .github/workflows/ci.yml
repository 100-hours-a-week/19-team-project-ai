name: Re-Fit AI CI

on:
  pull_request:
    # feature -> develop 또는 develop -> main PR 시 실행
    branches: [develop, main]
    types: [opened, synchronize, reopened]
  push:
    # develop 또는 main으로 push(머지 포함)될 때 실행
    branches: [develop, main]
  workflow_dispatch:
    # 수동 실행 시 작업을 선택할 수 있는 디스패처 구성
    inputs:
      job_to_run:
        description: 'Which job to run'
        required: true
        type: choice
        options:
          - lint-and-test
          - integration
          - release-dev
          - release-prod
          - all

permissions:
  contents: read

env:
  AWS_REGION: ${{ secrets.AWS_REGION || 'ap-northeast-2' }}
  PYTHON_VERSION: '3.11'
  WORKING_DIRECTORY: 'ai_app'

jobs:

  # 1. PR 검증 단계 (Lint + Test + Build Check)
  lint-and-test:
    if: |
      github.event_name == 'pull_request' ||
      (github.event_name == 'workflow_dispatch' && (github.event.inputs.job_to_run == 'lint-and-test' || github.event.inputs.job_to_run == 'all'))
    runs-on: ubuntu-latest
    concurrency:
      group: ai-ci-lint-${{ github.ref }}
      cancel-in-progress: true
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install lightweight CI tools
        run: |
          python -m pip install --upgrade pip
          pip install ruff bandit build

      # CI에서는 코드 수정 없이 검증만 수행
      - name: Run Lint and Format Check (Ruff)
        run: |
          ruff check ${{ env.WORKING_DIRECTORY }}
          ruff format --check ${{ env.WORKING_DIRECTORY }}

      # 기본 보안 정적 검사
      - name: Security Scan (Bandit)
        run: bandit -c pyproject.toml -r ${{ env.WORKING_DIRECTORY }} -x tests/

      # 머지 전 빌드 가능 여부 확인
      - name: Build Check
        run: python -m build --wheel

  # ===========================================
  # 2. 통합 검증 단계 (Integration Tests)
  # ===========================================
  integration:
    if: |
      (github.event_name == 'push' && github.ref == 'refs/heads/develop') ||
      (github.event_name == 'workflow_dispatch' && (github.event.inputs.job_to_run == 'integration' || github.event.inputs.job_to_run == 'all'))
    runs-on: ubuntu-latest
    concurrency:
      group: ai-ci-integration-${{ github.ref }}
      cancel-in-progress: true

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Skip Integration Tests
        run: echo "No integration tests configured, skipping"

  # ===========================================
  # 3. 개발 환경 릴리즈 (develop 브랜치 - Docker 기반)
  # ===========================================
  release-dev:
    needs: [integration]
    if: |
      always() &&
      needs.integration.result != 'failure' &&
      (
        (github.event_name == 'push' && github.ref == 'refs/heads/develop') ||
        (github.event_name == 'workflow_dispatch' && (github.event.inputs.job_to_run == 'release-dev' || github.event.inputs.job_to_run == 'all'))
      )
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.meta.outputs.image_tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Generate Image Metadata
        id: meta
        run: |
          SHA_SHORT="${GITHUB_SHA::7}"
          IMAGE_TAG="develop-${SHA_SHORT}"
          FULL_IMAGE="${{ steps.login-ecr.outputs.registry }}/${{ secrets.ECR_REPOSITORY_AI }}:${IMAGE_TAG}"
          LATEST_IMAGE="${{ steps.login-ecr.outputs.registry }}/${{ secrets.ECR_REPOSITORY_AI }}:develop-latest"

          echo "image_tag=${IMAGE_TAG}" >> $GITHUB_OUTPUT
          echo "full_image=${FULL_IMAGE}" >> $GITHUB_OUTPUT
          echo "latest_image=${LATEST_IMAGE}" >> $GITHUB_OUTPUT
          echo "sha_short=${SHA_SHORT}" >> $GITHUB_OUTPUT

      - name: Mask sensitive values in logs (Dev Release)
        run: |
          echo "::add-mask::${{ steps.login-ecr.outputs.registry }}"
          echo "::add-mask::${{ secrets.ECR_REPOSITORY_AI }}"
          echo "::add-mask::${{ steps.meta.outputs.image_tag }}"
          echo "::add-mask::${{ steps.meta.outputs.full_image }}"
          echo "::add-mask::${{ steps.meta.outputs.latest_image }}"
          echo "::add-mask::${{ secrets.PAT }}"
          echo "::add-mask::${{ secrets.AWS_ACCESS_KEY_ID }}"
          echo "::add-mask::${{ secrets.AWS_SECRET_ACCESS_KEY }}"

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v6
        env:
          DOCKER_BUILD_SUMMARY: false
          DOCKER_BUILD_RECORD_UPLOAD: false
          DOCKER_BUILD_CHECKS_ANNOTATIONS: false
        with:
          context: .
          push: true
          pull: true
          tags: |
            ${{ steps.meta.outputs.full_image }}
            ${{ steps.meta.outputs.latest_image }}
          cache-from: type=gha,scope=ai-dev
          cache-to: type=gha,mode=max,scope=ai-dev
          provenance: false
          sbom: false
          platforms: linux/arm64

      - name: Trigger CD-Dev Workflow
        if: success()
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.PAT }}
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'cd-dev.yml',
              ref: 'develop',
              inputs: {
                image_tag: '${{ steps.meta.outputs.image_tag }}',
                sha: '${{ github.sha }}',
                run_id: '${{ github.run_id }}'
              }
            });
            console.log('CD-Dev workflow triggered');

  # ===========================================
  # 4. 프로덕션 릴리즈 (main push 시 자동 - Docker + cd-prod)
  # ===========================================
  release-prod:
    if: |
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      (github.event_name == 'workflow_dispatch' && (github.event.inputs.job_to_run == 'release-prod' || github.event.inputs.job_to_run == 'all'))
    runs-on: ubuntu-latest
    concurrency:
      group: ai-ci-release-prod-${{ github.ref }}
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Skip Full Tests
        run: echo "No tests configured, skipping"
      
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
      
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Docker image tag
        id: docker-meta
        run: |
          SHA_SHORT="${GITHUB_SHA::7}"
          IMAGE_TAG="main-${SHA_SHORT}"
          echo "image_tag=${IMAGE_TAG}" >> $GITHUB_OUTPUT
          echo "sha_short=${SHA_SHORT}" >> $GITHUB_OUTPUT

      - name: Mask sensitive values in logs (Prod Release)
        run: |
          echo "::add-mask::${{ steps.login-ecr.outputs.registry }}"
          echo "::add-mask::${{ secrets.ECR_REPOSITORY_AI }}"
          echo "::add-mask::${{ steps.docker-meta.outputs.image_tag }}"
          echo "::add-mask::${{ steps.login-ecr.outputs.registry }}/${{ secrets.ECR_REPOSITORY_AI }}:${{ steps.docker-meta.outputs.image_tag }}"
          echo "::add-mask::${{ steps.login-ecr.outputs.registry }}/${{ secrets.ECR_REPOSITORY_AI }}:main-latest"
          echo "::add-mask::${{ secrets.AWS_ACCESS_KEY_ID }}"
          echo "::add-mask::${{ secrets.AWS_SECRET_ACCESS_KEY }}"
          echo "::add-mask::${{ secrets.PAT }}"

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v6
        env:
          DOCKER_BUILD_SUMMARY: false
          DOCKER_BUILD_RECORD_UPLOAD: false
          DOCKER_BUILD_CHECKS_ANNOTATIONS: false
        with:
          context: .
          push: true
          pull: true
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/${{ secrets.ECR_REPOSITORY_AI }}:${{ steps.docker-meta.outputs.image_tag }}
            ${{ steps.login-ecr.outputs.registry }}/${{ secrets.ECR_REPOSITORY_AI }}:main-latest
          cache-from: type=gha,scope=ai-prod
          cache-to: type=gha,mode=max,scope=ai-prod
          provenance: false
          sbom: false
          platforms: linux/arm64

      - name: Trigger CD-K8s Workflow
        if: success()
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.PAT }}
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'cd-k8s.yml',
              ref: 'main',
              inputs: {
                image_tag: '${{ steps.docker-meta.outputs.image_tag }}',
                sha: '${{ github.sha }}'
              }
            });
            console.log('CD-K8s workflow triggered successfully');

